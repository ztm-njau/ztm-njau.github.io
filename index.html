<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐！</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* 背景颜色，你也可以改成 background-image: url('背景图.jpg'); */
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #ff6b6b;
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            animation: bounce 2s infinite;
        }

        p {
            color: #555;
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto 30px auto;
            line-height: 1.6;
            padding: 0 20px;
        }

        /* 照片样式 */
        .photo-frame {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px auto;
            border-radius: 50%; /* 圆形 */
            border: 5px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            overflow: hidden; /* 裁剪超出部分 */
            cursor: pointer;
            transition: transform 0.5s;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 保证图片填满圆框不变形 */
        }

        .photo-frame:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .btn {
            background-color: #ff6b6b;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            transition: all 0.3s ease;
            outline: none;
        }

        .btn:active {
            transform: scale(0.95);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="photo-frame" onclick="celebrate()">
            <img src="photo.jpg" alt="寿星照片">
        </div>
        
        <h1 id="greeting">生日快乐！</h1>
        <p id="message">
            点击照片或按钮，查收你的专属惊喜！<br>
            愿你新的一岁，所求皆如愿，所行化坦途。
        </p>

        <button class="btn" onclick="celebrate()">点击播放音乐 & 庆祝 🎉</button>
    </div>

    <audio id="bgm" loop>
        <source src="music.mp3" type="audio/mpeg">
        您的浏览器不支持音频播放。
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script>
        // 标记音乐是否已经播放
        var isPlaying = false;

        function celebrate() {
            // 1. 播放音乐
            var audio = document.getElementById('bgm');
            if (!isPlaying) {
                audio.play().then(() => {
                    isPlaying = true;
                }).catch(error => {
                    console.log("浏览器限制自动播放，请用户再次点击");
                });
            }

            // 2. 更改文字
            document.getElementById('greeting').innerText = "Happy Birthday!!";
            document.getElementById('message').innerText = "祝你天天开心，万事胜意！";

            // 3. 播放彩带特效
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
            var random = function(min, max) { return Math.random() * (max - min) + min; }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: random(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: random(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }
    </script>
</body>
</html>
